name: Sync Discord Archive

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC = 15:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (full clone)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        run: python -m src.crawler
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - name: Retag all existing untagged messages
        run: python retag_all.py
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      - name: Render HTML
        run: python -m src.renderer

      - name: Push to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          
          # Archive data/docs BEFORE switching branches
          tar -czf /tmp/archive.tar.gz data/ docs/
          
          # Create a fresh orphan gh-pages branch
          git checkout --orphan gh-pages
          git rm -rf .
          
          # Restore from archive
          tar -xzf /tmp/archive.tar.gz
          
          git add data/ docs/
          git commit -m "chore: sync Discord data $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push "$REPO_URL" gh-pages --force