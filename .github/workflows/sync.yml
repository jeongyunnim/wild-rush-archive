name: Sync Discord Archive

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC = 15:00 KST
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (source code only)
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: |
            src/
            templates/
            requirements.txt
            .gitignore
            README.md
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run crawler
        run: python -m src.crawler
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - name: Render HTML
        run: python -m src.renderer

      - name: Push to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout gh-pages || git checkout --orphan gh-pages
          git add data/ docs/
          git diff --quiet || git commit -m "chore: sync Discord data $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push origin gh-pages --force